<!DOCTYPE html>
<html>
<head>
    <title>Practice Website</title>
</head>
<body>

<h1>Docker Compose Project</h1>

<button onclick="getData()">
Get Backend Data
</button>

<p id="result"></p>

<script>
async function getData() {

let response = await fetch(
'http://localhost:8000/'
);

let data = await response.json();

document.getElementById("result").innerHTML =
data.message;
}
</script>

</body>
</html>
