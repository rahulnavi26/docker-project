version: "3.9"

services:

  backend:
    build: ./backend
    container_name: backend

    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: frontend

    ports:
      - "80:80"

    depends_on:
      - backend

  mysql:
    image: mysql:8

    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: practice_db

    ports:
      - "3306:3306"